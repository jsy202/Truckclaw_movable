# docker-compose.yml — Leader Rotation + DinD 구조
#
# 봇 토큰은 1개 — session tar로 truck0 → truck1 이전됨
#
# Host
#   └── vehicle-truck0 (DinD)
#         └── openclaw-truck0  ← 현재 선두 (토큰 1개로 실행)
#   └── vehicle-truck1 (DinD)
#         └── openclaw-truck1  ← 선두 교체 후 session tar로 동일 봇 재기동
#   └── bridge-server          ← 협상 상태 REST API (18801)

services:

  # ── 브리지 서버 ─────────────────────────────────────────────────────────────
  bridge-server:
    image: python:3.10-slim
    container_name: platoon-bridge-server
    volumes:
      - ./bridge:/bridge:ro
      - ./platoon_destinations.json:/platoon_destinations.json:ro
    environment:
      PLATOON_DESTINATIONS_PATH: /platoon_destinations.json
    command: python3 /bridge/platoon_bridge_server.py
    network_mode: host
    restart: unless-stopped

  # ── vehicle-truck0 (현재 선두, DinD) ────────────────────────────────────────
  vehicle-truck0:
    build:
      context: .
      dockerfile: vehicle/Dockerfile
    container_name: vehicle-truck0
    environment:
      TRUCK_ID: truck0
      OPENCLAW_DATA_DIR: /data/openclaw
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_PORT: 18789
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # DinD 핵심
      - ${TRUCK0_CONFIG_DIR:-./.openclaw-truck0}:/data/openclaw
      - ./.transfer:/transfer                        # V2V 전송 버퍼
      - ./bridge:/project/scripts:ro
      - ./openclaw_migration:/project/openclaw_migration:ro
    network_mode: host
    restart: unless-stopped
    depends_on:
      - bridge-server

  # ── vehicle-truck1 (다음 선두, DinD) ────────────────────────────────────────
  # 평소엔 openclaw 없음. 선두 교체 시 session tar로 openclaw-truck1 자동 기동.
  vehicle-truck1:
    build:
      context: .
      dockerfile: vehicle/Dockerfile
    container_name: vehicle-truck1
    environment:
      TRUCK_ID: truck1
      OPENCLAW_DATA_DIR: /data/openclaw
      # 토큰은 session tar 안에 포함되어 전달됨 — 여기선 빈값
      DISCORD_BOT_TOKEN: ""
      OPENCLAW_GATEWAY_TOKEN: ""
      OPENCLAW_GATEWAY_PORT: 18790
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${TRUCK1_CONFIG_DIR:-./.openclaw-truck1}:/data/openclaw
      - ./.transfer:/transfer
      - ./bridge:/project/scripts:ro
      - ./openclaw_migration:/project/openclaw_migration:ro
    network_mode: host
    restart: unless-stopped
    depends_on:
      - bridge-server
